name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Validate ────────────────────────────────────────────────────────────────
  ci:
    name: Install / Lint / Build / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx nx format:check

      - name: Lint
        run: npx nx run-many -t lint --all

      - name: Typecheck
        run: npx nx run-many -t typecheck --all

      - name: Build
        run: npx nx run-many -t build --all

      - name: Test
        run: npx nx run-many -t test --all

  # ── Publish (main branch only) ──────────────────────────────────────────────
  publish:
    name: Publish to npm.elden-core.fr
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          # Configures an .npmrc pointing to the registry and wires NODE_AUTH_TOKEN
          registry-url: https://npm.elden-core.fr

      - name: Install dependencies
        run: npm ci

      - name: Build publishable packages
        run: npx nx run-many -t build --all

      - name: Publish @elden-core/nx-utils
        run: npm publish dist/packages/nx-utils --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
